{% extends "base.html" %}
{% load allauth account %}
{% block title %}Sign out — PyCommerce{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 py-12 lg:py-16">
    <div class="card p-8 text-center">
        <div class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-zinc-100 muted mb-4 mx-auto">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight mb-2">Sign out?</h1>
        <p class="muted text-sm mb-6">You'll need to sign in again next time.</p>

        <form method="post" action="{% url 'account_logout' %}" class="space-y-3">
            {% csrf_token %}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
            <button type="submit" class="btn-dark w-full h-11">Yes, sign out</button>
            <a href="{% url 'store:home' %}" class="btn-ghost w-full h-11">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
