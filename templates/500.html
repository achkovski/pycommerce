<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Something went wrong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-white text-zinc-900 antialiased">
    <section class="max-w-2xl mx-auto px-6 py-16 text-center">
        <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold bg-red-50 text-red-700 border border-red-200 mb-6">500</span>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight leading-[1.05] mb-4">
            Something went wrong on our end
        </h1>
        <p class="text-lg text-zinc-500 leading-relaxed max-w-xl mx-auto mb-8">
            We've been notified and are looking into it. Please try again in a moment.
        </p>
        <div class="flex flex-wrap justify-center gap-3">
            <a href="/" class="inline-flex items-center justify-center rounded-md text-sm font-medium h-10 px-4 bg-zinc-900 text-white hover:bg-zinc-800 transition">Back to home</a>
            <button type="button" onclick="location.reload()" class="inline-flex items-center justify-center rounded-md text-sm font-medium h-10 px-4 border border-zinc-200 bg-white text-zinc-900 hover:bg-zinc-50 transition">Retry</button>
        </div>
    </section>
</body>
</html>
